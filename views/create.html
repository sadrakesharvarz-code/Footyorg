<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a league • FootyOrg</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="brand" href="/">FootyOrg</a>
      <nav class="nav">
        <a class="pill" href="/login">Log in</a>
        <a class="btn" href="/join">Join a league</a>
      </nav>
    </header>
    <main class="page">
      <div class="card">
        <h1>Create a league</h1>
        <p>Just the basics — you can edit everything later.</p>
        <form class="form" method="POST" action="/create">
          <input type="text" name="leagueName" placeholder="League name" required />
          <div class="row">
            <input type="text" name="city" placeholder="City" required />
            <select name="format" required>
              <option value="">Format</option>
              <option>7v7</option>
              <option>11v11</option>
              <option>Futsal</option>
            </select>
          </div>
          <div class="row">
            <input type="date" name="startDate" required />
            <input type="number" name="price" placeholder="Price per player ($)" required />
          </div>
          <button class="btn primary" type="submit">Create league</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
