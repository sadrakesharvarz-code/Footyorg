<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FootyOrg</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #1f1d1a;
      --muted: #6a6762;
      --line: #ded8d0;
      --brand: #0d6b73;
      --brand-hover: #0a5258;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    a { text-decoration: none; color: inherit; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 8px 0 24px;
    }
    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pill, .btn {
      height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      background: #fff;
    }
    .btn.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    .btn.primary:hover {
      background: var(--brand-hover);
    }
    .hero {
      min-height: 72vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 48px 0;
    }
    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.92;
      margin: 0;
      letter-spacing: -0.06em;
    }
    .sub {
      max-width: 640px;
      margin: 20px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal.open { display: flex; }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--line);
    }
    .card h2 { margin: 0 0 8px; }
    .card p { margin: 0 0 18px; color: var(--muted); }
    .form {
      display: grid;
      gap: 12px;
    }
    .form input, .form select {
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      background: #faf9f7;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 640px) {
      .top, .nav, .actions, .row {
        grid-template-columns: 1fr;
        display: grid;
      }
      .hero {
        min-height: auto;
        padding: 24px 0 56px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">FootyOrg</div>
      <nav class="nav">
        <a class="pill" href="#" data-open="login">Log in</a>
        <a class="btn" href="#" data-open="join">Join a league</a>
        <a class="btn primary" href="#" data-open="create">Create a league</a>
      </nav>
    </header>

    <main class="hero">
      <div>
        <h1>FootyOrg</h1>
        <p class="sub">Simple soccer league signup.</p>
        <div class="actions">
          <a class="btn" href="#" data-open="join">Join a league</a>
          <a class="btn primary" href="#" data-open="create">Create a league</a>
        </div>
        <div class="small">Apple Pay-ready checkout can be connected in the backend.</div>
      </div>
    </main>
  </div>

  <div class="modal" id="login">
    <div class="card">
      <h2>Log in</h2>
      <p>Access your account.</p>
      <div class="form">
        <input placeholder="Email" />
        <input placeholder="Password" type="password" />
        <button class="btn primary">Continue</button>
      </div>
    </div>
  </div>

  <div class="modal" id="join">
    <div class="card">
      <h2>Join a league</h2>
      <p>Search a league and sign up.</p>
      <div class="form">
        <input placeholder="League code or name" />
        <input placeholder="Your name" />
        <button class="btn primary">Continue</button>
      </div>
    </div>
  </div>

  <div class="modal" id="create">
    <div class="card">
      <h2>Create a league</h2>
      <p>Start a new league.</p>
      <div class="form">
        <input placeholder="League name" />
        <div class="row">
          <input placeholder="City" />
          <select>
            <option>7v7</option>
            <option>11v11</option>
            <option>Futsal</option>
          </select>
        </div>
        <button class="btn primary">Continue</button>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(el.dataset.open).classList.add('open');
      });
    });

    document.querySelectorAll('.modal').forEach(m => {
      m.addEventListener('click', e => {
        if (e.target === m) m.classList.remove('open');
      });
    });

    addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
      }
    });
  </script>
</body>
</html>
