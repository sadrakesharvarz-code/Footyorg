<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="dashboard page">
    <header class="dashboard-header card">
      <div>
        <h1>Organizer Dashboard</h1>
        <p>Manage subscription, Stripe payouts, and leagues.</p>
      </div>

      <form method="POST" action="/logout">
        <button class="btn" type="submit">Log out</button>
      </form>
    </header>

    <section class="card">
      <h2>Organizer Status</h2>
      <div id="organizerStatus">Loading...</div>
      <div class="stack">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
        <button class="btn primary" id="connectBtn" type="button">Connect Stripe payouts</button>
      </div>
      <p id="connectMessage" class="message"></p>
      <p id="payoutStatus" class="message ok" style="display:none;">Stripe payouts connected</p>
    </section>

    <section class="card">
      <h2>Create League</h2>
      <form id="leagueForm" class="form">
        <div>
          <label for="leagueName">League name</label>
          <input id="leagueName" type="text" placeholder="Scarborough 11v11" />
        </div>
        <div>
          <label for="leagueSlug">Slug</label>
          <input id="leagueSlug" type="text" placeholder="scarborough-11v11" />
        </div>
        <div>
          <label for="leaguePrice">Price (CAD)</label>
          <input id="leaguePrice" type="number" step="0.01" placeholder="145.00" />
        </div>
        <button class="btn primary" type="submit">Create League</button>
      </form>
      <p id="leagueMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Leagues</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Slug</th>
            <th>Price</th>
            <th>Status</th>
            <th>Organizer</th>
          </tr>
        </thead>
        <tbody id="leaguesTable">
          <tr><td colspan="6" class="muted">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/organizer.js"></script>
</body>
</html>
