<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f6f7fb; color: #111; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 12px; margin-bottom: 6px; font-weight: 600; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 14px; padding: 10px 16px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button.secondary { background: #111827; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; }
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .muted { color: #6b7280; }
    .status { font-weight: 700; }
    .ok { color: #059669; }
    .warn { color: #b45309; }
    .error { color: #dc2626; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .small { font-size: 14px; }
    .message { margin-top: 12px; font-size: 14px; }
    .readonly { background: #f3f4f6; }
  </style>
</head>
<body>
  <div class="topbar card">
    <div>
      <h1>Organizer Dashboard</h1>
      <div class="muted small">Manage subscription, Stripe payouts, and leagues.</div>
    </div>
    <div>
      <label for="organizerId" class="small">Organizer ID</label>
      <input id="organizerId" type="number" value="1" min="1" class="readonly" readonly />
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Organizer Status</h2>
      <div id="organizerStatus" class="muted">Loading...</div>
      <button id="refreshBtn" class="secondary">Refresh</button>
      <button id="connectBtn">Connect Stripe payouts</button>
      <div id="connectMessage" class="message"></div>
    </div>

    <div class="card">
      <h2>Create League</h2>
      <form id="leagueForm">
        <label for="leagueName">League name</label>
        <input id="leagueName" required placeholder="Scarborough 11v11" />

        <label for="leagueSlug">Slug</label>
        <input id="leagueSlug" required placeholder="scarborough-11v11" />

        <label for="leaguePrice">Price (CAD)</label>
        <input id="leaguePrice" type="number" step="0.01" required placeholder="145.00" />

        <button type="submit">Create League</button>
      </form>
      <div id="leagueMessage" class="message"></div>
    </div>
  </div>

  <div class="card">
    <h2>Leagues</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Slug</th>
          <th>Price</th>
          <th>Status</th>
          <th>Organizer</th>
        </tr>
      </thead>
      <tbody id="leaguesTable">
        <tr><td colspan="6" class="muted">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="/organizer.js"></script>
</body>
</html>
